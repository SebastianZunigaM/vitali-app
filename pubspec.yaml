name: vitali
description: "VITALI - Tu compañero de salud integral."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.16.0

  # Environment variables
  flutter_dotenv: ^6.0.1

  # UI / Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.68.0

  # Media & Permissions
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Location
  geolocator: ^12.0.0

  # Internationalization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
